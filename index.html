<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>X-Ray Hand Portal Engine UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #wrap {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #status {
            position: absolute;
            top: 18px;
            left: 20px;
            color: #00ffcc;
            font-size: 13px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffcc;
            z-index: 10;
        }

        #frame-counter {
            position: absolute;
            top: 18px;
            right: 20px;
            color: #0088ff;
            font-size: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #0088ff;
            z-index: 10;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: 16px;
            letter-spacing: 3px;
            z-index: 20;
            text-align: center;
            line-height: 2;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <video id="vid" autoplay playsinline muted></video>
        <canvas id="cv"></canvas>
        <div id="status">INITIALIZING...</div>
        <div id="frame-counter">FRM: 0000</div>
        <div id="loader">LOADING DUAL NEURAL ENGINE...<br><span style="font-size:12px;color:#0088ff">Hands & Pose
                Modules</span></div>
    </div>

    <!-- MediaPipe Holistic -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <script>
        const vid = document.getElementById('vid');
        const cv = document.getElementById('cv');
        const ctx = cv.getContext('2d', { willReadFrequently: true });
        const statusEl = document.getElementById('status');
        const frameEl = document.getElementById('frame-counter');
        const loaderEl = document.getElementById('loader');

        let W = 0, H = 0;
        let frame = 0;
        let portalAlpha = 0;
        let scanY = 0;
        let sparkBurst = [];
        let streamParticles = [];
        let dataPackets = [];
        // --- MATH OPTIMIZATION LUTs ---
        const RAND_LUT = new Float32Array(5000);
        for (let i = 0; i < 5000; i++) RAND_LUT[i] = Math.random();
        const SIN_LUT = new Float32Array(1024);
        for (let i = 0; i < 1024; i++) SIN_LUT[i] = Math.sin((i / 1024) * Math.PI * 2);
        let glitchUntil = 0;
        let lastChestPos = { x: 0, y: 0 };
        let bodyDelta = { x: 0, y: 0 };
        let hudPos = { x: 0, y: 0 };
        let lerpPortal = { x: 0, y: 0, w: 0, h: 0 };

        for (let i = 0; i < 3; i++) {
            dataPackets.push({ yOff: 0.1 + Math.random() * 0.8, xBase: Math.random(), w: 30 + Math.random() * 50, spd: 0.005 + Math.random() * 0.015 });
        }

        // --- NEW NEURAL BODY SYSTEM ---
        function getParticleColor(zone, age) {
            const palettes = [
                ['#ffffff', '#ccffff', '#88ffff'],  // 0: head
                ['#ff4488', '#ff0055', '#ff88bb'],  // 1: chest/torso
                ['#00ffcc', '#00ff88', '#44ffaa'],  // 2: arms
                ['#ffffff', '#ffff88', '#ffcc00'],  // 3: hands
                ['#8844ff', '#aa66ff', '#cc99ff'],  // 4: hips/core
                ['#0088ff', '#0044ff', '#44aaff'],  // 5: legs
                ['#ff8800', '#ffaa00', '#ffcc44'],  // 6: feet
            ];
            const p = palettes[zone % palettes.length];
            return p[Math.floor(age * 0.05) % p.length];
        }

        class BodyParticle {
            constructor() {
                this.reset();
                this.life = Math.random();
                this.age = Math.random() * 100;
            }
            reset() {
                this.x = Math.random() * W; this.y = Math.random() * H;
                this.targetX = this.x; this.targetY = this.y;
                this.type = Math.floor(Math.random() * 5);
                this.baseSize = Math.random() * 3 + 0.5;
                this.size = this.baseSize;
                this.life = Math.random();
                this.maxLife = 0.6 + Math.random() * 0.4;
                this.speed = Math.random() * 0.8 + 0.1;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.colorTier = 0;
                this.age = 0;
            }
            update(dx = 0, dy = 0, isGlitching = false) {
                // Neural Attachment: Lock to body movement
                this.x += dx; this.y += dy;
                this.targetX += dx; this.targetY += dy;

                // Static behavior: Minimal noise, fast landing
                this.x += (this.targetX - this.x) * 0.15;
                this.y += (this.targetY - this.y) * 0.15;

                // Futuristic Glitch: Digital Jitter
                if (isGlitching) {
                    if (Math.random() < 0.2) this.x += (Math.random() - 0.5) * 15;
                    if (Math.random() < 0.05) this.y += (Math.random() - 0.5) * 5;
                }

                this.age++;
                this.life = Math.abs(SIN_LUT[(Math.floor(this.age * this.speed * 20)) % 1024]);
                this.size = this.baseSize * (0.6 + this.life * 0.4);
            }
            draw(ctx, layer) {
                if (this.life < 0.1) return;

                let opacity = this.life * 0.9;
                let sizeMult = 1.0;
                let blur = 0; // Disable blur for 10k particles performance

                if (layer === 'BACK') {
                    sizeMult = 0.4; opacity *= 0.3;
                } else if (layer === 'MID') {
                    sizeMult = 0.7; opacity *= 0.6;
                } else if (layer === 'FRONT') {
                    sizeMult = 1.2; opacity *= 1.0;
                    if (this.age % 10 === 0) blur = 4; // Minimal glow for depth
                }

                ctx.globalAlpha = opacity;
                const col = getParticleColor(this.colorTier, this.age);
                ctx.fillStyle = col; ctx.strokeStyle = col;
                if (blur > 0) { ctx.shadowBlur = blur; ctx.shadowColor = col; }
                else { ctx.shadowBlur = 0; }

                const s = this.size * sizeMult;
                ctx.fillRect(this.x - s / 2, this.y - s / 2, s, s);
                ctx.shadowBlur = 0;
            }
        }

        const BODY_PARTICLES = Array.from({ length: 10000 }, () => new BodyParticle());

        let currentHands = [];
        let currentPose = null;
        let currentMask = null;
        let isActive = false;
        let portalHold = false;
        let sparkCooldown = 0;

        const maskCv = document.createElement('canvas');
        const mctx = maskCv.getContext('2d', { willReadFrequently: true });
        maskCv.width = 100; maskCv.height = 100; // Efficient sampling size

        function resize() {
            W = cv.width = window.innerWidth;
            H = cv.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class EnergyParticle {
            constructor(x, y, vx, vy, col) {
                this.history = [{ x, y }];
                this.x = x; this.y = y;
                this.vx = vx * 0.6;
                this.vy = vy * 0.6;
                this.col = col;
                this.life = 1.0;
                this.maxHistory = 12;
                this.size = Math.random() * 2.5 + 1;
            }
            update() {
                this.x += this.vx + (Math.random() - 0.5) * 1.5;
                this.y += this.vy + (Math.random() - 0.5) * 1.5;
                this.history.unshift({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) this.history.pop();
                this.life -= 0.025;
            }
            draw(ctx) {
                this.history.forEach((pt, i) => {
                    const t = 1 - i / this.maxHistory;
                    ctx.globalAlpha = Math.max(0, t * this.life * 0.8);
                    ctx.fillStyle = this.col;
                    ctx.shadowBlur = 6 * t;
                    ctx.shadowColor = this.col;
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, this.size * t, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y;
                const ang = Math.random() * Math.PI * 2;
                const spd = Math.random() * 6 + 3;
                this.vx = Math.cos(ang) * spd;
                this.vy = Math.sin(ang) * spd;
                this.life = 1;
                this.col = ['#ffffff', '#00ffff', '#ccffff'][Math.floor(Math.random() * 3)];
                this.r = Math.random() * 3 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.85; this.vy *= 0.85;
                this.life -= 0.04;
            }
            draw() {
                if (this.life <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.col;
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.col;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        function triggerSparks(x, y) { for (let i = 0; i < 25; i++) sparkBurst.push(new Spark(x, y)); }

        function lmScale(handLm) { return { x: (1 - handLm.x) * W, y: handLm.y * H }; }
        function mapToPortal(normX, normY, px, py, pw, ph) { return { x: px + ((1 - normX) * pw), y: py + (normY * ph) }; }
        function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }
        function lerp(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; }

        function expandOutward(pt, centerX, amount) {
            const dx = pt.x - centerX;
            return { x: pt.x + (dx === 0 ? 0 : Math.sign(dx)) * amount, y: pt.y };
        }

        const ZONE_SIZES = {
            head: 300, chest: 600, leftArm: 300, rightArm: 300,
            core: 400, leftLeg: 400, rightLeg: 400, feet: 300
        };

        function getAnatomicalZone(y, pose, px, py, ph) {
            if (!pose) return 1;
            const getPy = (idx) => py + (pose[idx].y * ph);
            if (y < getPy(11) - 20) return 0; // head
            if (y > getPy(23) + 40) return 5; // legs/feet
            if (y > getPy(23) - 20) return 4; // core
            return 1; // torso/chest
        }

        let surgeT = 0;

        function drawHudNodes() {
            const bY = H - 52;
            const nodes = [
                { x: 55, label: 'INPUT' }, { x: 145, label: 'DETECT' }, { x: 245, label: 'POSE' },
                { x: 345, label: 'PORTAL' }, { x: 445, label: 'COMP' }, { x: 540, label: 'OUTPUT' },
            ];
            ctx.save();
            nodes.forEach((n, i) => {
                ctx.fillStyle = 'rgba(0,10,20,0.9)';
                ctx.strokeStyle = `rgba(0,${180 + i * 10},255,0.6)`;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.rect(n.x - 35, bY - 14, 70, 22); ctx.fill(); ctx.stroke();

                ctx.fillStyle = '#00ffcc'; ctx.font = '10px Courier New'; ctx.textAlign = 'center';
                ctx.fillText(n.label, n.x, bY + 2);

                if (i > 0) {
                    ctx.strokeStyle = 'rgba(0,180,255,0.4)';
                    ctx.beginPath(); ctx.moveTo(nodes[i - 1].x + 35, bY - 3); ctx.lineTo(n.x - 35, bY - 3); ctx.stroke();
                }
                const on = portalAlpha > 0.1 && i <= Math.floor((frame * 0.1) % 6);
                if (on) { ctx.fillStyle = `rgba(0,255,255,0.2)`; ctx.fillRect(n.x - 35, bY - 14, 70, 22); }
            });

            if (portalAlpha > 0.05 && currentHands && currentHands.length >= 2) {
                ctx.fillStyle = '#00ffcc'; ctx.font = '9px Courier New'; ctx.textAlign = 'right';
                ctx.fillText(`SYS.ONLINE // NEURAL_XRAY_V5`, W - 20, H - 35);
                ctx.fillText(`PARTICLES: 5,000 // CORE: STABLE`, W - 20, H - 20);
            }
            ctx.restore();
        }

        function draw3DGrid(ctx, px, py, pw, ph, pose) {
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 100, 255, 0.15)';
            ctx.lineWidth = 0.5;
            const hPt = pose ? pose[0] : { x: 0.5, y: 0.5 };
            const vX = px + (1 - hPt.x) * pw;
            const vY = py + hPt.y * ph - ph * 0.2; // Vanishing point moves with head

            // Perspective lines
            for (let i = 0; i < 15; i++) {
                const x = px + (i / 14) * pw;
                ctx.beginPath(); ctx.moveTo(x, py + ph); ctx.lineTo(vX, vY); ctx.stroke();
            }
            // Horizontal lines
            for (let i = 0; i < 12; i++) {
                const y = py + ph - (i / 11) * ph;
                const scale = 1 - (i / 11) * 0.8;
                const xL = vX + (px - vX) * scale;
                const xR = vX + (px + pw - vX) * scale;
                ctx.beginPath(); ctx.moveTo(xL, y); ctx.lineTo(xR, y); ctx.stroke();
            }
            ctx.restore();
        }

        function drawSkeletalCore(ctx, getPt) {
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);

            const sL = getPt(11), sR = getPt(12), hL = getPt(23), hR = getPt(24);
            const spineTop = { x: (sL.x + sR.x) / 2, y: (sL.y + sR.y) / 2 };
            const spineBottom = { x: (hL.x + hR.x) / 2, y: (hL.y + hR.y) / 2 };

            // Spine
            ctx.beginPath(); ctx.moveTo(spineTop.x, spineTop.y); ctx.lineTo(spineBottom.x, spineBottom.y); ctx.stroke();

            // Ribcage (Simplified loops)
            for (let i = 0; i < 3; i++) {
                const y = spineTop.y + (spineBottom.y - spineTop.y) * 0.15 * (i + 1);
                const w = (sR.x - sL.x) * (0.8 - i * 0.1);
                ctx.beginPath(); ctx.ellipse((sL.x + sR.x) / 2, y, w * 0.6, 10, 0, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.restore();
        }

        // MAIN DRAW LOOP
        function drawFrame() {
            ctx.clearRect(0, 0, W, H);

            // Draw Mirrored WebCam
            ctx.save();
            ctx.translate(W, 0); ctx.scale(-1, 1);
            ctx.drawImage(vid, 0, 0, W, H);
            ctx.restore();

            frame++; scanY += 0.008;

            if (frame % 75 === 0 && Math.random() < 0.6) {
                glitchUntil = frame + Math.floor(4 + Math.random() * 4);
            }
            const isGlitching = frame < glitchUntil;

            frameEl.textContent = `FRM: ${String(frame).padStart(4, '0')} ${isGlitching ? ' [ERR]' : ''}`;

            let lThumb, lIndex, rThumb, rIndex;
            let portalActiveThisFrame = false;

            if (currentHands && currentHands.length >= 2) {
                const h0 = currentHands[0], h1 = currentHands[1];
                const h0_idx = lmScale(h0[8]), h1_idx = lmScale(h1[8]);

                let leftSideHand, rightSideHand;
                if (h0_idx.x < h1_idx.x) { leftSideHand = h0; rightSideHand = h1; }
                else { leftSideHand = h1; rightSideHand = h0; }

                lThumb = lmScale(leftSideHand[4]); lIndex = lmScale(leftSideHand[8]);
                rThumb = lmScale(rightSideHand[4]); rIndex = lmScale(rightSideHand[8]);

                if (dist(lIndex, rIndex) < 160) {
                    portalActiveThisFrame = true; portalHold = true; sparkCooldown--;
                    if (sparkCooldown <= 0) {
                        triggerSparks((lIndex.x + rIndex.x) / 2, (lIndex.y + rIndex.y) / 2);
                        sparkCooldown = 15;
                    }
                } else if (portalHold) { portalActiveThisFrame = true; }
                else { portalHold = false; }
            } else {
                portalHold = false;
            }

            isActive = portalActiveThisFrame;
            portalAlpha += isActive ? 0.08 : -0.06;
            portalAlpha = Math.max(0, Math.min(1, portalAlpha));

            if (!currentHands || currentHands.length < 2) {
                statusEl.textContent = 'STANDBY: AWAITING BOTH HANDS'; statusEl.style.color = '#0055aa';
            } else if (!isActive) {
                statusEl.textContent = 'DETECTED: BRING FINGERS CLOSER (~150px)'; statusEl.style.color = '#00aaff';
            } else {
                statusEl.textContent = '[ PORTAL FULLY ACTIVE - STRETCH HANDS ]';
                statusEl.style.color = isGlitching ? '#ff4444' : '#00ffcc';
                statusEl.style.textShadow = `0 0 15px ${isGlitching ? '#ff0000' : '#00ffcc'}`;
            }

            sparkBurst = sparkBurst.filter(s => s.life > 0);
            sparkBurst.forEach(s => { s.update(); s.draw(); });

            if (portalAlpha > 0.01 && lThumb && rThumb) {
                const rawPx = Math.min(lThumb.x, lIndex.x, rThumb.x, rIndex.x);
                const rawPy = Math.min(lThumb.y, lIndex.y, rThumb.y, rIndex.y);
                const rawPw = Math.max(lThumb.x, lIndex.x, rThumb.x, rIndex.x) - rawPx;
                const rawPh = Math.max(lThumb.y, lIndex.y, rThumb.y, rIndex.y) - rawPy;

                const scale = 0.85;
                const cx = rawPx + rawPw / 2;
                const cy = rawPy + rawPh / 2;
                const px_raw = cx - (rawPw * scale) / 2;
                const py_raw = cy - (rawPh * scale) / 2;
                const pw_raw = rawPw * scale;
                const ph_raw = rawPh * scale;

                // Temporal Smoothing for Portal Window
                if (lerpPortal.w === 0) { lerpPortal = { x: px_raw, y: py_raw, w: pw_raw, h: ph_raw }; }
                lerpPortal.x += (px_raw - lerpPortal.x) * 0.3;
                lerpPortal.y += (py_raw - lerpPortal.y) * 0.3;
                lerpPortal.w += (pw_raw - lerpPortal.w) * 0.3;
                lerpPortal.h += (ph_raw - lerpPortal.h) * 0.3;

                const px = lerpPortal.x;
                const py = lerpPortal.y;
                const pw = lerpPortal.w;
                const ph = lerpPortal.h;

                function pushOutward(pt, oX, oY, amt) { return { x: oX + (pt.x - oX) * amt, y: oY + (pt.y - oY) * amt }; }
                const lThumbS = pushOutward(lThumb, cx, cy, scale);
                const lIndexS = pushOutward(lIndex, cx, cy, scale);
                const rThumbS = pushOutward(rThumb, cx, cy, scale);
                const rIndexS = pushOutward(rIndex, cx, cy, scale);

                if (pw > 15 && ph > 15) {
                    ctx.save();
                    ctx.globalAlpha = 1.0; // Instantly opaque portal

                    ctx.beginPath();
                    ctx.moveTo(lThumbS.x, lThumbS.y);
                    ctx.lineTo(rThumbS.x, rThumbS.y);
                    ctx.lineTo(rIndexS.x, rIndexS.y);
                    ctx.lineTo(lIndexS.x, lIndexS.y);
                    ctx.closePath();
